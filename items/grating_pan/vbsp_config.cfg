"Conditions"
	{
	"Condition"
		{
		"instance" "<ITEM_PANEL_GRATING>"
		"Result"
			{
			"Has" "Grating"
			}
		"Condition"
			{
			"instvar" "$connectioncount > 0"
			// Dynamic
			"Result"
				{
				"GlobalInput"
					{
					"Target" "model_arms"
					"Input"  "SetAnimation"
					"Param"  "$animation"
					"Delay"  "0.0"
					}
				"Condition"
					{
					"instvar" "$start_deployed 0"
					"Result"
						{
						"GlobalInput"
							{
							"Target" "model_arms"
							"Input"  "SetPlaybackRate"
							"Param"  "-1"
							"Delay"  "0.01"
							}
						}
					}
				"TemplateBrush"
					{
					"ID" "BEE2_GRATING_PAN:dynamic"
					"keys"
						{
						"classname" "func_brush"
						"solidbsp" "1"
						"parent_attachment_point" "panel_attach"
						}
					"localkeys"
						{
						"targetname" "panel_top"
						"parentname" "model_arms"
						}
					}
				"Switch"
					{
					"Flag" "instvar"
					"$animation ramp_30_deg_open"
						{
						"TemplateBrush" "BEE2_ANGLED_PAN_CLEAN_COLL:dynamic_30"
						}
					"$animation ramp_45_deg_open"
						{
						"TemplateBrush" "BEE2_ANGLED_PAN_CLEAN_COLL:dynamic_45"
						}
					"$animation ramp_60_deg_open"
						{
						"TemplateBrush" "BEE2_ANGLED_PAN_CLEAN_COLL:dynamic_60"
						}
					"$animation ramp_90_deg_open"
						{
						"TemplateBrush" "BEE2_ANGLED_PAN_CLEAN_COLL:dynamic_90"
						}
					}
				}
			"ElseCondition" // Otherwise, static.
				{
				"InstVar" "$start_deployed = 0"
				"Result"
					{
					// Flat on the floor.
					"ChangeInstance" "<ITEM_PANEL_GRATING:bee2_static00>"
					}					
				"ElseSwitch"
					{
					"Flag" "instvar"
					"$animation ramp_30_deg_open"
						{
						"TemplateBrush" "BEE2_ANGLED_PAN_CLEAN_COLL:static_30"
						"ChangeInstance" "<ITEM_PANEL_GRATING:bee2_static30>"
						"TemplateBrush"
							{
							"ID" "BEE2_GRATING_PAN:static30"
							"keys"
								{
								"classname" "func_brush"
								}
							}
						}
					"$animation ramp_45_deg_open"
						{
						"TemplateBrush" "BEE2_ANGLED_PAN_CLEAN_COLL:static_45"
						"ChangeInstance" "<ITEM_PANEL_GRATING:bee2_static45>"
						"TemplateBrush"
							{
							"ID" "BEE2_GRATING_PAN:static45"
							"keys"
								{
								"classname" "func_brush"
								}
							}
						}
					"$animation ramp_60_deg_open"
						{
						"TemplateBrush" "BEE2_ANGLED_PAN_CLEAN_COLL:static_60"
						"ChangeInstance" "<ITEM_PANEL_GRATING:bee2_static60>"
						"TemplateBrush"
							{
							"ID" "BEE2_GRATING_PAN:static60"
							"keys"
								{
								"classname" "func_brush"
								}
							}
						}
					"$animation ramp_90_deg_open"
						{
						"TemplateBrush" "BEE2_ANGLED_PAN_CLEAN_COLL:static_90"
						"ChangeInstance" "<ITEM_PANEL_GRATING:bee2_static90>"
						"TemplateBrush"
							{
							"ID" "BEE2_GRATING_PAN:static90"
							"keys"
								{
								"classname" "func_brush"
								}
							}
						}
					}
				}
			}
		}
	}	
